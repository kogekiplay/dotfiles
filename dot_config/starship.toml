# Starship config - EdenQwQ style with refined colors
"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true

format = """
$directory\
$git_branch\
$git_status\
$fill\
$c\
$cpp\
$golang\
$java\
$nodejs\
$bun\
$python\
$rust\
$container\
$nix_shell\
$time\n\
$character \
"""

palette = "noctalia"

[palettes.custom]
base = '#1a1a18'
mantle = '#121211'
surface0 = '#302f2c'
surface1 = '#383732'
surface2 = '#403f39'
overlay0 = '#65635e'
overlay1 = '#706e67'
overlay2 = '#78766e'
subtext0 = '#dededd'
subtext1 = '#e8e8e7'
text = '#f2f2f2'
love = '#b24355'
gold = '#bdb79a'
peach = '#c2725f'
rose = '#c25f63'
pine = '#a8aba0'
foam = '#acac9f'
iris = '#afac9c'
sky = '#a9aba0'

[character]
format = "$symbol "
success_symbol = "[╰─ >](bold iris)"
error_symbol = "[╰─ >](bold love)"

[username]
disabled = false
format = "[╭─  $user ](fg:text) "
show_always = true
style_user = "fg:text"
style_root = "fg:love"

[directory]
format = "[╭─   $path ](fg:iris)"
style = "fg:iris"
truncation_length = 3
truncation_symbol = ".../"

[directory.substitutions]
Documents = "docs"
Downloads = "dl"
Pictures = "pics"

[fill]
style = "fg:surface1"
symbol = "·"

[git_branch]
format = "[  $branch ](fg:foam)"
style = "fg:foam"
symbol = ""

[git_status]
disabled = false
style = "fg:love"
format = '([$all_status$ahead_behind]($style))'
up_to_date = '[ ✓ ](fg:iris)'
untracked = '[?\($count\)](fg:gold)'
stashed = '[$](fg:iris)'
modified = '[!\($count\)](fg:gold)'
renamed = '[>>\($count\)](fg:iris)'
deleted = '[xx\($count\)](fg:love)'
staged = '[++\($count\)](fg:gold)'
ahead = '[↑\($count\)](fg:foam)'
diverged = '[↑\($ahead_count\)↓\($behind_count\)](fg:rose)'
behind = '[↓\($count\)](fg:rose)'

[time]
disabled = false
format = "[   $time ](fg:text) "
style = "fg:text"
time_format = "%H:%M"

[cmd_duration]
format = "[dur: $duration ](fg:overlay1)"

[c]
style = "fg:pine"
format = "[ $symbol$version ](fg:pine) "
symbol = "c:"

[cpp]
style = "fg:pine"
format = "[ $symbol$version ](fg:pine) "
symbol = "cpp:"

[golang]
style = "fg:pine"
format = "[ $symbol$version ](fg:pine) "
symbol = "go:"

[java]
style = "fg:pine"
format = "[ $symbol$version ](fg:pine) "
symbol = "java:"

[nodejs]
style = "fg:pine"
format = "[ $symbol$version ](fg:pine) "
symbol = "node:"

[bun]
style = "fg:pine"
format = "[ $symbol$version ](fg:pine) "
symbol = "bun:"

[python]
style = "fg:pine"
format = "[ $symbol$version ](fg:pine) "
symbol = "py:"

[rust]
style = "fg:pine"
format = "[ $symbol$version ](fg:pine) "
symbol = "rs:"

[docker_context]
style = "fg:pine"
format = "[ $symbol$context ](fg:pine) "
symbol = "docker:"

[nix_shell]
format = 'via [$symbol$state]($style) '
symbol = "nix:"
style = "bold foam"
impure_msg = "impure"
pure_msg = "pure"
unknown_msg = ""
disabled = false

[lua]
style = "fg:pine"
format = "[ $symbol$version ](fg:pine) "
symbol = "lua:"

[ruby]
style = "fg:pine"
format = "[ $symbol$version ](fg:pine) "
symbol = "rb:"

[deno]
style = "fg:pine"
format = "[ $symbol$version ](fg:pine) "
symbol = "deno:"

[swift]
style = "fg:pine"
format = "[ $symbol$version ](fg:pine) "
symbol = "sw:"

[elixir]
style = "fg:pine"
format = "[ $symbol$version ](fg:pine) "
symbol = "exs:"

[elm]
style = "fg:pine"
format = "[ $symbol$version ](fg:pine) "
symbol = "elm:"

[haskell]
style = "fg:pine"
format = "[ $symbol$version ](fg:pine) "
symbol = "hs:"

[julia]
style = "fg:pine"
format = "[ $symbol$version ](fg:pine) "
symbol = "jl:"

[nim]
style = "fg:pine"
format = "[ $symbol$version ](fg:pine) "
symbol = "nim:"

[scala]
style = "fg:pine"
format = "[ $symbol$version ](fg:pine) "
symbol = "scala:"

[conda]
style = "fg:pine"
format = "[ $symbol$environment ](fg:pine) "
symbol = "conda:"

[package]
style = "fg:gold"
format = "[ $symbol$version ](fg:gold) "
symbol = "pkg:"

[memory_usage]
disabled = false
format = "[mem: $ram ](fg:overlay1)"
style = "fg:overlay1"

[localip]
ssh_only = true
format = "[ip:$localipv4](fg:overlay1) "
disabled = false

[battery]
format = "[$percentage$symbol]($style)"
full_symbol = "="
charging_symbol = "+"
discharging_symbol = "-"
unknown_symbol = "?"
empty_symbol = "!"

[[battery.display]]
threshold = 20
style = "fg:love"

[[battery.display]]
threshold = 60
style = "fg:gold"

[env_var.VIMSHELL]
format = "[$env_value]($style)"
style = 'fg:foam'

[sudo]
format = "[$symbol]($style)"
style = "bold love"
symbol = "#"
disabled = false

[jobs]
format = "[$symbol$number]($style) "
style = "fg:iris"
symbol = "j:"



